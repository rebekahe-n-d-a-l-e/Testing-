<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
</head>
<body>
    <h1>Login Page</h1>
    <form action="./index.html" method="get">
        <label for="username">Username;</label>
        <input type="text" id="username" name="username" placeholder="Type username..." required maxlength="10"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Type email..." required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Type password..." required><br><br>
        <input type="submit" value="Login">
        </form>
        
</body>
</html>
