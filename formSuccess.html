<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THe first Form</title>
</head>
<body>
    <h1>Login Page</h1>
    <form action="#">
    
    <fieldset>
      <legend>Personal Information</legend>

      <label for="username">Username:</label>
      <input type="text" id="username" name="username" placeholder="Type username..." required maxlength="15"><br><br>

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" min="13" max="100" step="1" value="18"><br><br>

      <label for="bio">Readonly field:</label>
      <input type="text" id="bio" value="Read only" readonly><br><br>

      <label for="status">Disabled field:</label>
      <input type="text" id="status" value="Disabled" disabled>
    </fieldset>
    <fieldset>
      <legend>Input Types</legend>

      <p>What is your favorite food?:</p>
      <input type="radio" id="pizza" name="food" value="pizza" checked>
      <label for="pizza">Pizza</label><br>
      <input type="radio" id="burger" name="food" value="burger">
      <label for="burger">Burger</label><br><br>

      <p>What are your hobbies?:</p>
      <input type="checkbox" id="coding" name="hobby" value="coding" checked>
      <label for="coding">Coding</label><br>
      <input type="checkbox" id="gaming" name="hobby" value="gaming">
      <label for="gaming">Gaming</label>
    </fieldset>
    <fieldset>
      <legend>Form Tags</legend>

      <label for="cars">Select &amp; Optgroup:</label>
      <select id="cars" name="cars">
        <optgroup label="Swedish Cars">
          <option value="volvo">Volvo</option>
          <option value="saab">Saab</option>
        </optgroup>
        <optgroup label="German Cars">
          <option value="mercedes">Mercedes</option>
          <option value="audi">Audi</option>
        </optgroup>
      </select><br><br>

      <label for="browser">Datalist:</label>
      <input list="browsers" id="browser" name="browser">
      <datalist id="browsers">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Edge">
        <option value="Safari">
      </datalist><br><br>

      <label for="message">Textarea:</label><br>
      <textarea id="message" name="message" rows="4" cols="30"></textarea><br><br>

      <label for="calc">Output:</label>
      <output id="calc" name="calc">100</output>
    </fieldset>

    <fieldset>
      <legend>Buttons</legend>

      <button type="button">Click Button</button><br><br>
      <input type="submit" value="Submit Input">
    </fieldset>
    </form>
    
</body>
</html>
